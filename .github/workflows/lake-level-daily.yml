name: Lake Travis Elevation (Daily 8 AM CT)

on:
  schedule:
    # 13:00 UTC = 8:00 AM CDT / 7:00 AM CST.
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lake-level-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Pull lake level
        env:
          TZ: America/Chicago
        run: python scripts/lake_level.py

      - name: Commit data/ if anything changed
        run: |
          git config user.name  "popsguide-bot"
          git config user.email "popsguide-bot@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No data changes; skipping commit."
          else
            git commit -m "auto(lake-level): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
