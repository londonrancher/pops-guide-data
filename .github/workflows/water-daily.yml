name: Water + Boil + Burn (Daily 6:30 AM CT)

on:
  schedule:
    # 11:30 UTC = 6:30 AM CDT (summer) / 5:30 AM CST (winter).
    # GH Actions cron is UTC-only; the 1-hour winter drift is acceptable.
    - cron: '30 11 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: water-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Get Playwright version
        id: pw-version
        run: |
          echo "version=$(python -c 'import playwright; print(playwright.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium binary (cache miss only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Install Playwright OS dependencies (always — fresh VM each run)
        run: python -m playwright install-deps chromium

      - name: Run water check
        env:
          TZ: America/Chicago
        run: python scripts/water_check.py

      - name: Commit data/ if anything changed
        run: |
          git config user.name  "popsguide-bot"
          git config user.email "popsguide-bot@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No data changes; skipping commit."
          else
            git commit -m "auto(water-daily): refresh at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
