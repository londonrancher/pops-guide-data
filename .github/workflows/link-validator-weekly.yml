name: External Link Health (Sun 8 AM CT)

on:
  schedule:
    # 13:00 UTC = 8 AM CDT / 7 AM CST. Sundays only.
    - cron: '0 13 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: link-validator-weekly
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # No Playwright needed — this one is pure httpx HEAD/GET.

      - name: Validate links
        env:
          TZ: America/Chicago
        run: python scripts/link_validator.py

      - name: Commit data/ if anything changed
        run: |
          git config user.name  "popsguide-bot"
          git config user.email "popsguide-bot@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No data changes; skipping commit."
          else
            git commit -m "auto(link-validator): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase || true
            git push
          fi
